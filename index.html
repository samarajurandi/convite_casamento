<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Casamento Premium</title>
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="Convite de Casamento - Samara e Jurandi" />
    <meta property="og:description" content="Temos a alegria de convidar você para celebrar nosso casamento! Clique para abrir o convite." />
    <meta property="og:type" content="website" />

    <meta property="og:image" content="https://samarajurandi.github.io/convite_casamento/imagens/previa-whatsapp.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta property="og:url" content="https://samarajurandi.github.io/convite_casamento/" />
    </head>
<body>

    <img src="imagens/fundo_landingpage.png" class="page-background" alt="">

    <div class="container">
        <div class="envelope-wrapper" id="envelope">
            <img src="imagens/logo.png" class="logo" alt="Logo do Casal">


            <div class="envelope-back"></div>

            <img src="imagens/carta_convite.png" class="letter" alt="Wedding Invitation Letter">
            <img src="imagens/corpo_envelope.png" class="envelope-front" alt="Envelope Front">
            <img src="imagens/aba_envelope.png" class="flap" alt="Envelope Flap">

        </div>
        <p class="instrucao">Clique no envelope para abrir</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
